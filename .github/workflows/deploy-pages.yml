name: Deploy site to GitHub Pages

# 每次 digest / 报告 / 网页层变动推到 main 时，用 web/build.py 现构一个
# 单文件 site/index.html 并发布到 Pages。site/ 仍 gitignore，不入库。
on:
  push:
    branches: [main]
    paths:
      - "digests/**"
      - "future-tech/**"
      - "web/**"
      - "sources.md"
      - "README.md"
      - "stats/**"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch: {}
  # 每天刷新一次公开收藏快照（即使当天没有新 digest 推送）
  schedule:
    - cron: "37 20 * * *"   # 20:37 UTC ≈ 次日 04:37 北京时间

permissions:
  contents: read
  pages: write
  id-token: write

# 同一时刻只发布一份，新推送取消进行中的旧构建
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # build.py 读完整 git log 生成更新日志
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install markdown
      # 用私密 gist 里的收藏生成公开只读快照；build.py 会把它内联进单文件。
      # 无 secret 时脚本写空快照，构建照常。token 只存在于 Action 环境，不入库。
      - name: Publish public watchlist snapshot
        env:
          GIST_TOKEN: ${{ secrets.GIST_TOKEN }}
        run: python scripts/publish_watchlist.py
      - run: python web/build.py --out site
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
